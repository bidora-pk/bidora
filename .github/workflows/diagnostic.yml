name: Diagnostic Login Test

on:
  workflow_dispatch: # Allows you to run this manually

jobs:
  test_login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium python-dotenv

      - name: Run Login Diagnostic Tool
        env:
          EPADS_EMAIL: ${{ secrets.EPADS_EMAIL }}
          EPADS_PASSWORD: ${{ secrets.EPADS_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipeline/test_login.py